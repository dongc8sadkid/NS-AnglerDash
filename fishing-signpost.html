<!DOCTYPE html>
<html lang="zh">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NS 钓鱼指路 · NS Fishing Signpost</title>
<style>
  :root{
    --bg:#FBFCFC; --surface:#FFFFFF; --surface-2:#F2F5F4;
    --ink:#1B2426; --muted:#5E6B6E; --hint:#8A9699;
    --line:rgba(27,36,38,.12); --line-2:rgba(27,36,38,.22);
    --sea:#0F6E56;
    --keep-bg:#EAF3DE; --keep-fg:#3B6D11;
    --limit-bg:#FAEEDA; --limit-fg:#854F0B;
    --rel-bg:#EFEFEC; --rel-fg:#5F5E5A;
    --zone-bg:#E6F1FB; --zone-fg:#0C447C;
    --warn-bg:#FAEEDA; --warn-fg:#854F0B;
    --radius:12px; --radius-sm:8px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#12181A; --surface:#1B2326; --surface-2:#232C2F;
      --ink:#E6EBEC; --muted:#9BA8AB; --hint:#6E7B7E;
      --line:rgba(255,255,255,.12); --line-2:rgba(255,255,255,.22);
      --sea:#5DCAA5;
      --keep-bg:#1c2a16; --keep-fg:#9DC56B;
      --limit-bg:#33260f; --limit-fg:#E6B566;
      --rel-bg:#242523; --rel-fg:#A6A6A0;
      --zone-bg:#0e2236; --zone-fg:#85B7EB;
      --warn-bg:#33260f; --warn-fg:#E6B566;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:440px;margin:0 auto;padding:18px 14px 28px}
  .app{background:var(--surface);border:1px solid var(--line-2);border-radius:16px;overflow:hidden}
  .head{padding:15px 16px 12px;display:flex;align-items:center;gap:10px}
  .head .ic{font-size:22px;line-height:1}
  .head h1{margin:0;font-size:17px;font-weight:600;letter-spacing:.2px}
  .head .sub{margin:0;font-size:11.5px;color:var(--hint)}
  .langbtn{margin-left:auto;flex:none;border:1px solid var(--line-2);background:var(--surface-2);
           color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;
           padding:5px 11px;border-radius:999px;cursor:pointer}
  .langbtn:hover{color:var(--ink)}
  .disc{margin:0 16px 12px;padding:8px 11px;background:var(--warn-bg);color:var(--warn-fg);
        border-radius:var(--radius-sm);font-size:11.5px;line-height:1.5}
  .cfg{margin:0 16px 12px;padding:8px 11px;background:var(--zone-bg);color:var(--zone-fg);
       border-radius:var(--radius-sm);font-size:11.5px;line-height:1.5}
  .seg{margin:0 16px 14px;display:flex;background:var(--surface-2);border-radius:var(--radius-sm);padding:3px;gap:3px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:inherit;
              font-size:13px;padding:8px 0;border-radius:6px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--surface);color:var(--ink);font-weight:600;
              border:1px solid var(--line)}
  .controls{margin:0 16px 12px;display:flex;gap:8px;align-items:center}
  .controls[hidden]{display:none}
  select{flex:1;height:38px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);
         border-radius:var(--radius-sm);padding:0 10px;font-family:inherit;font-size:13px}
  .zone{font-size:11px;padding:6px 9px;background:var(--zone-bg);color:var(--zone-fg);
        border-radius:var(--radius-sm);white-space:nowrap}
  .clbl{font-size:12px;color:var(--muted);white-space:nowrap}
  .switch{margin:0 16px 14px;display:flex;align-items:center;justify-content:space-between}
  .switch label{font-size:13px;color:var(--muted);cursor:pointer}
  .tog{position:relative;width:40px;height:23px;flex:none;cursor:pointer}
  .tog input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .tog .track{position:absolute;inset:0;background:var(--line-2);border-radius:999px;transition:background .15s;pointer-events:none}
  .tog .knob{position:absolute;top:2px;left:2px;width:19px;height:19px;background:#fff;border-radius:50%;
             transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.25);pointer-events:none}
  .tog input:checked ~ .track{background:var(--sea)}
  .tog input:checked ~ .knob{transform:translateX(17px)}
  .tog input:focus-visible ~ .track{outline:2px solid var(--sea);outline-offset:2px}
  .list{padding:0 16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
        padding:12px 14px;margin-bottom:10px}
  .crow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .cname{font-size:14.5px;font-weight:600}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:999px;line-height:1.5}
  .b-keep{background:var(--keep-bg);color:var(--keep-fg)}
  .b-limit{background:var(--limit-bg);color:var(--limit-fg)}
  .b-rel{background:var(--rel-bg);color:var(--rel-fg)}
  .b-zone{background:var(--zone-bg);color:var(--zone-fg)}
  .b-warn{background:var(--warn-bg);color:var(--warn-fg)}
  .csub{font-size:11px;color:var(--hint);margin:0 0 7px}
  .gist{font-size:12px;color:var(--muted);margin:0 0 10px}
  .pages{display:flex;gap:8px;margin-bottom:8px}
  .pg{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);
      padding:8px 10px;text-align:left;cursor:pointer;font-family:inherit}
  .pg:hover{border-color:var(--line-2)}
  .pg .lbl{font-size:10px;color:var(--hint)}
  .pg .val{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--ink)}
  .go{width:100%;border:1px solid var(--sea);background:transparent;color:var(--sea);
      font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:var(--radius-sm);
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .go:hover{background:var(--sea);color:#fff}
  .go:disabled{border-color:var(--line-2);color:var(--hint);cursor:default;background:transparent}
  .go .ar{font-size:13px}
  .hidden-note{margin:2px 16px 12px;font-size:11px;color:var(--hint);line-height:1.5}
  .legend{margin:0 16px 4px;display:flex;gap:14px;flex-wrap:wrap;font-size:10.5px;color:var(--hint)}
  .legend i{font-style:normal}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
  .d-keep{background:var(--keep-fg)} .d-limit{background:var(--limit-fg)} .d-rel{background:var(--rel-fg)}
  .foot{border-top:1px solid var(--line);margin-top:6px;padding:11px 16px;font-size:10.5px;
        color:var(--hint);line-height:1.5}
  .foot a{color:var(--sea)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  *:focus-visible{outline:2px solid var(--sea);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="app" role="region" aria-label="Nova Scotia fishing signpost">
    <div class="head">
      <span class="ic" aria-hidden="true">🐟</span>
      <div><h1 id="title"></h1><p class="sub" id="sub"></p></div>
      <button class="langbtn" id="lang"></button>
    </div>
    <p class="disc" id="disc"></p>
    <p class="cfg" id="cfg" hidden></p>
    <div class="seg" role="tablist">
      <button id="seg-fresh" role="tab" aria-pressed="false"></button>
      <button id="seg-marine" role="tab" aria-pressed="true"></button>
    </div>
    <div class="controls">
      <select id="pick"></select>
    </div>
    <div class="controls" id="zone-row" hidden>
      <label for="mzone" class="clbl" id="mzone-lbl"></label>
      <select id="mzone"></select>
    </div>
    <p class="hidden-note" id="gulf-note" hidden></p>
    <div class="controls" id="county-row" hidden>
      <label for="county" class="clbl" id="county-lbl"></label>
      <select id="county"></select>
    </div>
    <div class="switch">
      <label for="keep" id="keep-lbl"></label>
      <span class="tog">
        <input type="checkbox" id="keep" checked>
        <span class="track" aria-hidden="true"></span>
        <span class="knob" aria-hidden="true"></span>
      </span>
    </div>
    <div class="legend" id="legend" aria-hidden="true"></div>
    <div class="list" id="list"></div>
    <p class="hidden-note" id="hidden" hidden></p>
    <div class="foot" id="foot"></div>
  </div>
</div>

/* ===== 逻辑 / logic ===== */
const state = {lang:"zh", water:"marine", pick:"all", keepOnly:true, county:META.userCounty, marineZone:"west"};
const $ = id => document.getElementById(id);
const L = () => UI[state.lang];
const fmt = (tpl, v) => tpl.replace(/\{(\w+)\}/g, (_, k) => (k in v ? v[k] : "{"+k+"}"));

function rfaOf(c){ return RFA_MAP.find(r => r.counties.includes(c)); }
function canKeep(s){ return (s.status==="keep"||s.status==="limit") && s.shore; }
function esc(t){ return String(t).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function nm(s){ return s.name[state.lang]; }
function shortName(s){
  if(state.lang==="en") return s.name.en;
  const cjk = s.name.zh.match(/[\u4e00-\u9fa5（）()·]+/g);
  return cjk ? cjk.join("") : s.name.zh;
}

function openPdf(p){
  if(!META.handbookPdfUrl){ $("cfg").hidden=false; $("cfg").scrollIntoView({behavior:"smooth",block:"center"}); return; }
  window.open(META.handbookPdfUrl + "#page=" + p, "_blank", "noopener");
}
function openUrl(u){ if(u) window.open(u, "_blank", "noopener"); }

function badge(status){
  const map = {keep:["b-keep",L().lKeep], limit:["b-limit",L().lLimit], rel:["b-rel",L().lRel]};
  const [c,t]=map[status]; return `<span class="badge ${c}">${t}</span>`;
}

function cardFresh(s){
  const r = rfaOf(state.county);
  const rfaLabel = r ? `${state.county} · RFA ${r.rfa}` : state.county;
  const rfaPages = r ? fmt(L().pages,{a:r.book[0],b:r.book[1]}) : "—";
  const rfaPdf = r ? r.pdf[0] : s.genPdf;
  return `<div class="card">
    <div class="crow"><span class="cname">${esc(nm(s))}</span>${badge(s.status)}
      <span class="badge b-zone">📍 ${esc(rfaLabel)}</span></div>
    <p class="gist">${esc(s.gist[state.lang])}</p>
    <div class="pages">
      <button class="pg" onclick="openPdf(${s.genPdf})">
        <span class="lbl">${L().general}</span><br><span class="val">${fmt(L().handbookPage,{p:s.genBook})}</span></button>
      <button class="pg" onclick="openPdf(${rfaPdf})">
        <span class="lbl">${L().local} ${esc(rfaLabel)}</span><br><span class="val">${rfaPages}</span></button>
    </div>
    <button class="go" onclick="openPdf(${s.genPdf})">${fmt(L().openPdf,{p:s.genBook})} <span class="ar">↗</span></button>
  </div>`;
}

function cardMarine(s){
  // groundfish 带 zones,按 state.marineZone 取分区规则;其余鱼种全省统一
  let gist, url, zoneTxt, isVerify;
  if(s.zones){
    const z = s.zones[state.marineZone];
    gist = z.gist[state.lang]; url = z.url; zoneTxt = z.label[state.lang]; isVerify = !!z.verify;
  } else {
    gist = s.gist[state.lang]; url = s.url; zoneTxt = L().zoneAll; isVerify = !!s.verify;
  }
  const verify = isVerify ? `<span class="badge b-warn">⚠ ${L().verify}</span>` : "";
  const zone = `<span class="badge b-zone">📍 ${esc(zoneTxt)}</span>`;
  const sub = s.sub ? `<p class="csub">${esc(s.sub)}</p>` : "";
  const btn = url
    ? `<button class="go" onclick="openUrl('${url}')">${L().viewDfo} <span class="ar">↗</span></button>`
    : `<button class="go" disabled>${L().noManaged}</button>`;
  return `<div class="card">
    <div class="crow"><span class="cname">${esc(nm(s))}</span>${badge(s.status)}${verify}${zone}</div>
    ${sub}<p class="gist">${esc(gist)}</p>${btn}
  </div>`;
}

function render(){
  const pool = SPECIES.filter(s => s.water === state.water);
  let shown = state.pick==="all" ? pool.slice() : pool.filter(s => nm(s) === state.pick);
  let hiddenNames = [];
  if(state.keepOnly){
    hiddenNames = shown.filter(s => !canKeep(s)).map(shortName);
    shown = shown.filter(canKeep);
  }
  $("list").innerHTML = shown.length
    ? shown.map(s => s.water==="fresh" ? cardFresh(s) : cardMarine(s)).join("")
    : `<p class="gist" style="text-align:center;padding:10px 0">${L().none}</p>`;
  if(hiddenNames.length){ $("hidden").hidden=false; $("hidden").textContent=fmt(L().hidden,{n:hiddenNames.join(" / ")}); }
  else $("hidden").hidden = true;
  $("gulf-note").hidden = !(state.water==="marine" && state.marineZone==="gulf");

  const cur = state.pick;
  $("pick").innerHTML = `<option value="all">${L().pickAll}</option>` +
    pool.map(s => `<option value="${esc(nm(s))}">${esc(nm(s))}</option>`).join("");
  $("pick").value = pool.some(s=>nm(s)===cur) ? cur : "all";
  if($("pick").value !== cur) state.pick = $("pick").value;
}

function applyStatic(){
  const t = L();
  document.documentElement.lang = state.lang;
  $("title").textContent = t.title;
  $("sub").textContent = t.sub;
  $("disc").textContent = t.disclaimer;
  $("seg-fresh").textContent = t.fresh;
  $("seg-marine").textContent = t.marine;
  $("county-lbl").textContent = t.county;
  $("keep-lbl").textContent = t.keepOnly;
  $("mzone-lbl").textContent = t.mzoneLbl;
  $("gulf-note").textContent = t.gulfNote;
  const mz = state.marineZone;
  $("mzone").innerHTML = ["west","east","gulf"].map(k =>
    `<option value="${k}" ${k===mz?"selected":""}>${esc(t["zoneOpt"+k.charAt(0).toUpperCase()+k.slice(1)])}</option>`).join("");
  $("lang").textContent = t.toBtn;
  $("pick").setAttribute("aria-label", t.pickAll);
  $("county").setAttribute("aria-label", t.county);
  $("mzone").setAttribute("aria-label", t.mzoneLbl);
  $("keep").setAttribute("aria-label", t.keepOnly);
  $("legend").innerHTML =
    `<i><span class="dot d-keep"></span>${t.lKeep}</i>`+
    `<i><span class="dot d-limit"></span>${t.lLimit}</i>`+
    `<i><span class="dot d-rel"></span>${t.lRel}</i>`;
  $("foot").innerHTML = fmt(t.verified,{d:META.verified}) +
    `<a href="${META.dfoOrders}" target="_blank" rel="noopener">${t.orders}</a>`;
  if(!META.handbookPdfUrl){ $("cfg").hidden=false; $("cfg").textContent=t.cfg; }
}

function sync(){
  $("seg-fresh").setAttribute("aria-pressed", state.water==="fresh");
  $("seg-marine").setAttribute("aria-pressed", state.water==="marine");
  const fresh = state.water==="fresh";
  $("county-row").hidden = !fresh;   // 县下拉:仅淡水
  $("zone-row").hidden = fresh;      // 海区下拉:仅海水
  render();
}

function init(){
  $("county").innerHTML = RFA_MAP.map(r =>
    `<optgroup label="RFA ${r.rfa}">` +
    r.counties.map(c => `<option ${c===state.county?"selected":""}>${esc(c)}</option>`).join("") +
    `</optgroup>`).join("");
  $("seg-fresh").onclick  = () => { state.water="fresh";  state.pick="all"; sync(); };
  $("seg-marine").onclick = () => { state.water="marine"; state.pick="all"; sync(); };
  $("pick").onchange   = e => { state.pick = e.target.value; render(); };
  $("county").onchange = e => { state.county = e.target.value; render(); };
  $("mzone").onchange  = e => { state.marineZone = e.target.value; render(); };
  $("keep").onchange   = e => { state.keepOnly = e.target.checked; render(); };
  $("lang").onclick    = () => { state.lang = state.lang==="zh" ? "en" : "zh"; state.pick="all"; applyStatic(); render(); };
  applyStatic();
  sync();
}
init();
</script>
